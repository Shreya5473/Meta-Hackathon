# ============================================================
# GEOTRADE — Asset Universe Configuration
# ============================================================
# Add new assets here without touching Python code.
# Fields:
#   symbol      : ticker / identifier used across the platform
#   label       : human-readable short name
#   class       : commodity | equity_index | forex | crypto | stock
#   sector      : energy | metals | grains | defense | financials | tech | etc.
#   region      : global | americas | europe | asia_pacific | middle_east
#   finnhub_sym : Finnhub API symbol (leave blank to use synthetic prices)
#   oanda_sym   : OANDA symbol for forex/commodities
#   geo_sensitivity : list of geopolitical shock types this asset reacts to
#   base_price  : reference price for synthetic data generation
#   description : one-line description shown in the UI

version: "1.0"

assets:

  # ── COMMODITIES ──────────────────────────────────────────
  - symbol: XAUUSD
    label: Gold
    class: commodity
    sector: metals
    region: global
    finnhub_sym: GLD
